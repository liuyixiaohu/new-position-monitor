# Filters: Product Marketing internship positions
# Title must match at least one keyword from EACH group (AND logic)
filters:
  # Group 1: Must be an internship
  intern_keywords:
    - "intern"
    - "internship"
  # Group 2: Must be product marketing related
  role_keywords:
    - "product marketing"
    - "marketing"
    - "PMM"
    - "growth"
    - "go-to-market"
    - "GTM"
    - "brand"
    - "content"
    - "communications"
  # Group 3: Must be in the US (matches against location field)
  location_keywords:
    - "United States"
    - ", CA"
    - ", NY"
    - ", TX"
    - ", WA"
    - ", MA"
    - ", IL"
    - ", CO"
    - ", PA"
    - ", GA"
    - ", MI"
